<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
		<link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.png') }}">
		<title>Integrated Patient Health System</title>
		<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
		
		<!-- Bootstrap CSS -->
		<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
		
		<!-- Fontawesome CSS -->
		<link rel="stylesheet" href="{{ url_for('static', filename='plugins/fontawesome/css/fontawesome.min.css') }}">
		<link rel="stylesheet" href="{{ url_for('static', filename='plugins/fontawesome/css/all.min.css') }}">
		
		<!-- Select2 CSS -->
		<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/select2.min.css') }}">
		
		<!-- Feathericon CSS -->
		<link rel="stylesheet" href="{{ url_for('static', filename='css/feather.css') }}">
		
		<!-- Main CSS -->
		<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
		
	</head>
    <body>
	
		<!-- Main Wrapper -->
		<div class="main-wrapper login-body">
			<div class="container-fluid px-0">
				<div class="row">
				
					<!-- Login logo -->
					<div class="col-lg-6 login-wrap">
						<div class="login-sec">
							<div class="log-img">
								<img class="img-fluid" src="{{ url_for('static', filename='img/login-02.png') }}" alt="Logo">
							</div>
						</div>
					</div>
					<!-- /Login logo -->
					
					<!-- Login Content -->
					<div class="col-lg-7 login-wrap-bg">
						<div class="login-wrapper">
							<div class="loginbox">								
								<div class="login-right">
									<div class="login-right-wrap">
										<div class="account-logo">
											<a href="#"><img src="{{ url_for('static', filename='upec.png') }}" alt=""></a>
										</div>
										<h2>Integrated Patient Health System</h2>
										<h3>Admin Login</h3><br/><br/>

										<!-- error message-->
										{% with messages = get_flashed_messages(with_categories=true) %}
											{% if messages %}
												{% for category, message in messages %}
												<div class="error-banner">{{ message }}</div>
												{% endfor %}
											{% endif %}
										{% endwith %}


										<!-- Form -->
										<form action="{{ url_for('index') }}" method="POST">
											<div class="input-block">
												<label>Staff Email <span class="login-danger">*</span></label>
												<input class="form-control" type="text" name="email" required>
											</div>

											<div class="input-block">
												<label>Password <span class="login-danger">*</span></label>
												<input class="form-control pass-input" type="password" name="password" required>
											</div>

											<div class="input-block login-btn">
												<button class="btn btn-primary btn-block" type="submit">Login</button>
											</div>
										</form>
										<!-- /Form -->
									</div>
								</div>
							</div>
							
						</div>
					</div>
					<!-- /Login Content -->
					
				</div>
			</div>
		</div>
		<!-- /Main Wrapper -->
		
		<!-- jQuery -->
		<script src="{{ url_for('static', filename='js/jquery-3.7.1.min.js') }}"></script>
		<!-- Bootstrap Core JS -->
		<script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
		<!-- Feather Js -->
		<script src="{{ url_for('static', filename='js/feather.min.js') }}"></script>
		
		
		<!-- Custom JS -->
		<script src="{{ url_for('static', filename='js/app.js') }}"></script>
		
    </body>
</html>
